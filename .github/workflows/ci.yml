name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  backend:
    name: Backend (Python 3.13)
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: "test-secret-key-for-ci"
      DB_HOST: "localhost"
      DB_PORT: "5432"
      DB_USER: "postgres"
      DB_PASSWORD: "password"
      DB_NAME: "sigecon"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        package-directory: backend

    - name: Set up Python 3.13
      run: uv python install 3.13

    - name: Install dependencies
      run: |
        cd backend
        uv sync --all-groups

    - name: Run tests
      run: |
        cd backend
        uv run pytest tests/

  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Lint
      run: |
        cd frontend
        npm run lint

    - name: Build
      run: |
        cd frontend
        npm run build
