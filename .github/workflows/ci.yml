name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: "test-secret-key-for-ci"
      POSTGRES_URL: "postgresql://postgres:password@localhost/sigecon"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up uv
      uses: astral-sh/setup-uv@v8.0.0
      with:
        enable-cache: false
        pyproject-file: backend/pyproject.toml

    - name: Set up Python 3.13
      run: uv python install 3.13

    - name: Install dependencies
      run: |
        cd backend
        uv sync --all-groups

    - name: Run tests with coverage
      run: |
        cd backend
        uv run pytest --cov=app --cov-report=xml:coverage.xml --junitxml=test-results.xml tests/

    - name: Upload Backend Test Data
      uses: actions/upload-artifact@v7
      with:
        name: backend-test-data
        path: |
          backend/coverage.xml
          backend/test-results.xml

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Run tests with coverage
      run: |
        cd frontend
        npm run test:coverage

    - name: Upload Frontend Coverage
      uses: actions/upload-artifact@v7
      with:
        name: frontend-coverage
        path: frontend/coverage/lcov.info

  migrate:
    name: Run DB Migrations
    needs: [backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    env:
      POSTGRES_URL: ${{ secrets.POSTGRES_URL_NON_POOLING }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up uv
      uses: astral-sh/setup-uv@v8.0.0
      with:
        enable-cache: false
        pyproject-file: backend/pyproject.toml

    - name: Set up Python 3.13
      run: uv python install 3.13

    - name: Install dependencies
      run: cd backend && uv sync --all-groups

    - name: Run migrations
      run: cd backend && uv run alembic upgrade head

  sonarcloud:
    name: SonarCloud Scan
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download Backend Test Data
      uses: actions/download-artifact@v8
      with:
        name: backend-test-data
        path: backend

    - name: Download Frontend Coverage
      uses: actions/download-artifact@v8
      with:
        name: frontend-coverage
        path: frontend/coverage

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v7
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
