sonar.projectKey=sigecon
sonar.organization=heitorpolidoro
sonar.sources=.
sonar.inclusions=**/*.py,**/*.js,**/*.ts,**/*.jsx,**/*.tsx
sonar.exclusions=**/node_modules/**,**/.git/**,**/.venv/**,**/__pycache__/**,**/alembic/**,**/tests/**,**/docker-compose.yml,**/Dockerfile,**/frontend/dist/**,**/backend/.venv/**

# Python specific analysis
sonar.python.version=3.13

# Node.js / Frontend specific analysis (if applicable, though typically handled by separate engines or plugins)
# For simplicity, we'll include JS/TS files here. More specific configurations might be needed.
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx
